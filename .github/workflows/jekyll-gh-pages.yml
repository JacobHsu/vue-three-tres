name: Build and Deploy Plugins to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: yarn

      - name: Build refinery plugin
        run: yarn pre.build.refinery

      - name: Deploy refinery to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist-refinery
          commit_message: 'deploy: refinery plugin'

      - name: Build water plugin
        run: yarn pre.build.water

      - name: Deploy water to GitHub Pages (/water/)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist-water
          destination_dir: water
          keep_files: true
          commit_message: 'deploy: water plugin'
